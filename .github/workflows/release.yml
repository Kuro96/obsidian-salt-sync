name: Release Plugin

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin release assets
        run: pnpm --filter @salt-sync/shared --filter @salt-sync/plugin build

      - name: Check plugin bundle safety
        run: pnpm --filter @salt-sync/plugin check:bundle-safety

      - name: Stage release files
        run: |
          mkdir -p release_assets/salt-sync
          cp packages/plugin/dist/main.js release_assets/
          cp packages/plugin/manifest.json release_assets/
          cp packages/plugin/styles.css release_assets/
          cp packages/plugin/dist/main.js release_assets/salt-sync/
          cp packages/plugin/manifest.json release_assets/salt-sync/
          cp packages/plugin/styles.css release_assets/salt-sync/
          cd release_assets/salt-sync
          zip -r ../salt-sync.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/main.js
            release_assets/manifest.json
            release_assets/styles.css
            release_assets/salt-sync.zip
          draft: false
          prerelease: false
          generate_release_notes: true
