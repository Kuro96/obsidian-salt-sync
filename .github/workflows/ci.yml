name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package types
        run: pnpm --filter @salt-sync/shared build

      - name: Type check workspace
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm -r test

      - name: Build workspace
        run: pnpm --filter @salt-sync/shared --filter @salt-sync/server --filter @salt-sync/plugin build

      - name: Check plugin bundle safety
        run: pnpm --filter @salt-sync/plugin check:bundle-safety

      - name: Upload plugin bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: salt-sync-plugin-dist
          path: |
            packages/plugin/dist/main.js
            packages/plugin/manifest.json
            packages/plugin/styles.css
