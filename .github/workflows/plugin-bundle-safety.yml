name: Plugin Bundle Safety

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  plugin-bundle-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build shared package
        run: corepack pnpm --filter @salt-sync/shared build

      - name: Build plugin bundle
        run: corepack pnpm --filter @salt-sync/plugin build

      - name: Check plugin bundle safety
        run: corepack pnpm --filter @salt-sync/plugin check:bundle-safety
