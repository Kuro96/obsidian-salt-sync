services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  salt-sync:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATA_DIR: /app/docker/data/server
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: salt-sync
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      SERVER_TOKEN: ${SERVER_TOKEN:-dev-token}
      VAULT_TOKENS: ${VAULT_TOKENS:-}
    volumes:
      - ./data/server:/app/docker/data/server
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
