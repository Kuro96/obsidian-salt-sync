# Salt Sync public Nginx reverse-proxy template
#
# Goals:
# - TLS termination at Nginx
# - Only expose sync/file APIs required by clients
# - Do not expose /admin or /health to the public Internet
# - Support WebSocket upgrades for /vault/sync/
# - Add conservative rate/connection limits and upload size limits
#
# Replace these placeholders before use:
# - sync.example.com
# - /etc/nginx/ssl/sync.example.com/fullchain.pem
# - /etc/nginx/ssl/sync.example.com/privkey.pem
# - client_max_body_size value if your attachment policy differs
#
# Recommended backend posture:
# - Run Salt Sync server on 127.0.0.1:3000 only
# - Do not publish the Node process directly to the Internet

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

limit_req_zone $binary_remote_addr zone=salt_sync_api:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=salt_sync_conn:10m;

upstream salt_sync_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name sync.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sync.example.com;

    ssl_certificate     /etc/nginx/ssl/sync.example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/sync.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Tune this to your maximum allowed attachment size.
    client_max_body_size 50m;
    keepalive_timeout    65;

    proxy_http_version      1.1;
    proxy_set_header Host   $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    limit_conn salt_sync_conn 20;

    # Explicitly block non-public endpoints.
    location = /health {
        return 403;
    }

    location = /admin {
        return 403;
    }

    location ^~ /admin/ {
        return 403;
    }

    # WebSocket sync channel.
    location ^~ /vault/sync/ {
        limit_req zone=salt_sync_api burst=30 nodelay;

        proxy_pass http://salt_sync_backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Public HTTP APIs needed by clients: blobs, snapshots, file download/export.
    location ^~ /vault/ {
        limit_req zone=salt_sync_api burst=20 nodelay;
        proxy_pass http://salt_sync_backend;
    }

    # Deny everything else by default.
    location / {
        return 404;
    }
}
